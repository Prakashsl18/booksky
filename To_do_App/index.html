<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>READER SPACE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>BOOKSKY</h1>
    </div>

    <div class="container">
        <div class="book-container">
            <h2>TAKE THE FIRST STEP</h2>
            <h5>Cristiano</h5>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Totam laudantium at repellat adipisci voluptates praesentium repellendus distinctio placeat facere, voluptatem reprehenderit nam ipsum ex, fugit commodi aliquid saepe. Dolorem, quaerat.</p>
            <button onclick="deletebook(event)">Delete</button>
        </div>
    </div>
    <div class="popup-overlay"></div>
    <div class="popup-box">
        <h2>Add Book</h2>
        <form>
            <input type="text" placeholder="Book Title" id="book-title-input">
            <input type="text" placeholder="Book Author" id="book-author-input">
            <textarea placeholder="Short Description" id="book-description-input"></textarea>
            <button id="add-book">ADD</button>
            <button id="cancel-popup">CANCEL</button>
        </form>
    </div>
    <button class="add-button" id="add-popup-button">+</button>
    <script src="do.js"></script>
</body>
</html>
